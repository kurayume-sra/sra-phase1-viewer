<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SRA INTERNAL ARCHIVE - ERD GEO REPORT PHASE 1</title>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#02040a;
    font-family: "Times New Roman", serif;
}

.viewer{
    width:100vw;
    height:100vh;
    display:flex;
    overflow-x:auto;
    overflow-y:hidden;
    scroll-snap-type:x mandatory;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
    background:#02040a;
}

.viewer::-webkit-scrollbar{
    height:10px;
}

.viewer::-webkit-scrollbar-thumb{
    background:#333;
    border-radius:999px;
}

.slide{
    flex:0 0 100vw;
    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    scroll-snap-align:start;
    position:relative;

    background:#02040a;
}

.slide img{

    max-width:100%;
    max-height:100%;

    object-fit:contain;

    user-select:none;
    -webkit-user-drag:none;

    box-shadow:
        0 0 40px rgba(0,0,0,0.85),
        0 0 120px rgba(40,80,180,0.12);
}

.counter{

    position:fixed;
    right:20px;
    bottom:14px;

    color:rgba(255,255,255,0.55);

    font-size:12px;
    letter-spacing:2px;

    z-index:30;

    pointer-events:none;
}

.nav{

    position:fixed;
    top:50%;
    transform:translateY(-50%);

    width:56px;
    height:56px;

    border:none;
    border-radius:999px;

    background:rgba(255,255,255,0.08);

    color:white;

    font-size:28px;

    cursor:pointer;

    z-index:50;

    backdrop-filter:blur(10px);

    transition:0.25s;
}

.nav:hover{
    background:rgba(255,255,255,0.16);
}

.prev{
    left:16px;
}

.next{
    right:16px;
}

@media (max-width: 900px){

    .nav{
        width:44px;
        height:44px;
        font-size:22px;
    }

    .counter{
        font-size:10px;
    }
}

</style>
</head>

<body>

<div class="counter" id="counter">
1 / 9
</div>

<button class="nav prev" onclick="moveSlide(-1)">‹</button>
<button class="nav next" onclick="moveSlide(1)">›</button>

<div class="viewer" id="viewer">

<div class="slide">
<img src="1.jpg">
</div>

<div class="slide">
<img src="2.jpg">
</div>

<div class="slide">
<img src="3.jpg">
</div>

<div class="slide">
<img src="4.jpg">
</div>

<div class="slide">
<img src="5.jpg">
</div>

<div class="slide">
<img src="6.jpg">
</div>

<div class="slide">
<img src="7.jpg">
</div>

<div class="slide">
<img src="8.jpg">
</div>

<div class="slide">
<img src="9.jpg">
</div>

</div>

<script>

const viewer = document.getElementById("viewer");
const counter = document.getElementById("counter");

let current = 0;
const total = 9;

function moveSlide(dir){

    current += dir;

    if(current < 0){
        current = 0;
    }

    if(current >= total){
        current = total - 1;
    }

    viewer.scrollTo({
        left: window.innerWidth * current,
        behavior: 'smooth'
    });

    updateCounter();
}

function updateCounter(){

    counter.innerText =
        `${current + 1} / ${total}`;
}

viewer.addEventListener('scroll', () => {

    current = Math.round(
        viewer.scrollLeft / window.innerWidth
    );

    updateCounter();
});

document.addEventListener('keydown', (e) => {

    if(e.key === "ArrowRight"){
        moveSlide(1);
    }

    if(e.key === "ArrowLeft"){
        moveSlide(-1);
    }
});

</script>

</body>
</html>
