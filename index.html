<!DOCTYPE html>
<html lang="ja">
<head>

<script>

if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {

window.location.href =
"https://kurayume-sra.github.io/sra-phase1-mobile/";

}

</script>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>
SRA INTERNAL ARCHIVE
</title>

<style>

html, body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:black;

    color:white;

    font-family:
    "Times New Roman", serif;
}

/* =========================
   PC VIEW
========================= */

.viewer{

    width:100vw;
    height:100vh;

    display:flex;

    overflow-x:auto;
    overflow-y:hidden;

    scroll-snap-type:x mandatory;

    scroll-behavior:smooth;

    -webkit-overflow-scrolling:touch;
}

.slide{

    flex:0 0 100vw;

    width:100vw;
    height:100vh;

    display:flex;

    justify-content:center;
    align-items:center;

    scroll-snap-align:start;

    background:black;
}

.slide img{

    width:100%;
    height:100%;

    object-fit:contain;

    user-select:none;
    -webkit-user-drag:none;

    background:black;
}

.counter{

    position:fixed;

    bottom:20px;
    right:24px;

    z-index:10;

    font-size:13px;

    opacity:0.7;
}

.nav{

    position:fixed;

    top:50%;

    transform:translateY(-50%);

    z-index:20;

    width:58px;
    height:58px;

    border:none;

    border-radius:999px;

    background:rgba(255,255,255,0.08);

    color:white;

    font-size:28px;

    cursor:pointer;

    backdrop-filter:blur(10px);

    transition:0.25s;
}

.nav:hover{

    background:rgba(255,255,255,0.18);
}

.prev{
    left:18px;
}

.next{
    right:18px;
}

/* =========================
   SMARTPHONE
========================= */

@media (max-width: 900px){

    html, body{

        width:100%;
        height:100%;

        overflow:hidden;

        background:black;
    }

    .viewer{

        width:100vw;
        height:100vh;

        display:flex;

        overflow-x:auto;
        overflow-y:hidden;

        scroll-snap-type:x mandatory;
    }

    .slide{

        flex:0 0 100vw;

        width:100vw;
        height:100vh;

        display:flex;

        justify-content:center;
        align-items:center;

        padding:0;

        background:black;
    }

    .slide img{

        width:100vw;
        height:100vh;

        object-fit:contain;

        background:black;
    }

    .counter{

        bottom:10px;
        right:14px;

        font-size:10px;
    }

    .nav{

        width:48px;
        height:48px;

        font-size:22px;
    }
}

</style>
</head>

<body>

<div class="counter" id="counter">

1 / 9

</div>

<button class="nav prev"
onclick="moveSlide(-1)">
‹
</button>

<button class="nav next"
onclick="moveSlide(1)">
›
</button>

<div class="viewer" id="viewer">

<div class="slide">
<img src="1.jpg">
</div>

<div class="slide">
<img src="2.jpg">
</div>

<div class="slide">
<img src="3.jpg">
</div>

<div class="slide">
<img src="4.jpg">
</div>

<div class="slide">
<img src="5.jpg">
</div>

<div class="slide">
<img src="6.jpg">
</div>

<div class="slide">
<img src="7.jpg">
</div>

<div class="slide">
<img src="8.jpg">
</div>

<div class="slide">
<img src="9.jpg">
</div>

</div>

<script>

const viewer =
document.getElementById("viewer");

const counter =
document.getElementById("counter");

let current = 0;

const total = 9;

function moveSlide(dir){

    current += dir;

    if(current < 0)
    current = 0;

    if(current >= total)
    current = total - 1;

    viewer.scrollTo({

        left:
        window.innerWidth * current,

        behavior:'smooth'
    });

    updateCounter();
}

function updateCounter(){

    counter.innerText =
    `${current + 1} / ${total}`;
}

viewer.addEventListener('scroll', () => {

    current = Math.round(

        viewer.scrollLeft
        / window.innerWidth
    );

    updateCounter();
});

document.addEventListener('keydown', (e) => {

    if(e.key === "ArrowRight"){

        moveSlide(1);
    }

    if(e.key === "ArrowLeft"){

        moveSlide(-1);
    }
});

</script>

</body>
</html>
